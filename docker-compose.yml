services:
  postgres:
    image: postgres:16-alpine
    container_name: crm-cafe24-0604-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: crmdb
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    ports:
      - "5432:5432"
    volumes:
      - crm_cafe24_0604_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d crmdb"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  crm_cafe24_0604_pgdata:
